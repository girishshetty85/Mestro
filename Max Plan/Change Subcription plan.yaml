appId: com.miko3.app
---
- launchApp:
    clearState: False

- tapOn: Parents Zone

- tapOn: "0"
- tapOn: "0"
- tapOn: "0"
- tapOn: "0"

- assertVisible:
    id: id_app_bar_profile

- doubleTapOn:
    id: id_app_bar_profile
    delay: 100

- longPressOn: |-
    Miko MAX Subscription
    1st  April 2026

- tapOn: Change subscription plan
- assertVisible: |-
    Note:
    Your plan will change and you will be billed according to the new plan from your next billing date.

- assertVisible: Your Current Plan
- tapOn: Change my Miko Max Plan
- tapOn: Yes, Update



