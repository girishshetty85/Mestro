name: Maestro Mobile Tests

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  maestro-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v3
        with:
          java-version: '11'
          distribution: 'temurin'

      - name: Install Maestro
        run: |
          brew tap mobile-dev-inc/tap
          brew install maestro
          echo "Maestro installed successfully"

      - name: Verify Maestro Installation
        run: maestro --version

      - name: Run Clock Tests
        run: maestro test Clock.yaml
        continue-on-error: true

      - name: Run VerifyUsername Tests
        run: maestro test VerifyUsername.yaml
        continue-on-error: true

      - name: Run Reporting Tests
        run: maestro test Reporting.yaml
        continue-on-error: true

      - name: Run loginName Tests
        run: maestro test loginName.yaml
        continue-on-error: true
