    Manage AI Conversations
    Please note
    •   
    Choose whether your child can have AI-powered conversations with Miko.
    •   
    In AI-powered conversations, children can create stories, explore topics like animals, space, oceans, and history, and share ideas through conversation. These interactions are designed with child safety in mind.
